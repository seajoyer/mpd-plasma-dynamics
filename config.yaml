physics:
  gamma: 1.67
  beta:  0.05
  H_z0:  0.25

time:
  T:  0.5
  dt: 0.00001

adaptive_dt:
  enabled:       true
  cfl_number:    0.45
  growth_factor: 1.10
  dt_min:        1.0e-9
  dt_max:        5.0e-5

convergence:
  threshold:       0.0
  check_frequency: 100

output:
  directory: output
  run_name:  run
  vtk_step:  5000

parallel:
  openmp_threads: 0
  mpi_dims_l: 0
  mpi_dims_m: 0

grid:
  L_max: 800
  M_max: 400

# ── Geometry ─────────────────────────────────────────────────────────────────
#
# type must match a name registered in register_all_geometries().
#
# Built-in types:
#   short_cathode_cosine     C¹ cosine-smoothed throat transition (recommended)
#   short_cathode_parabolic  Piecewise-parabolic throat (legacy)
#
geometry:
  type: short_cathode_cosine

# ── Initial conditions ────────────────────────────────────────────────────────
#
# type must match a name registered in RegisterAllInitialConditions().
# The only built-in type is 'expression'.
#
# ── Expression IC ─────────────────────────────────────────────────────────────
#
# Each of the eight primary physical fields is specified as a mathematical
# expression evaluated cell-by-cell.  Derived fields (p, P) are computed
# automatically from the primaries after all eight have been assigned.
#
# params layout
# ─────────────
#   vars:               (optional)
#     <name>: <double>  User-defined named constants, visible in all expressions.
#                       Names must not shadow built-in symbols (see below).
#
#   rho / v_z / v_r / v_phi / H_z / H_r / H_phi / e
#     (all optional — defaults reproduce the standard MHD quiescent state)
#     Each field is a scalar: either a plain number or a quoted expression string.
#
# Built-in symbols available in every expression
# ───────────────────────────────────────────────
#   Physics constants  (from the [physics] block)
#     gamma   beta   H_z0   r_0
#
#   Spatial variables  (cell-local, read-only)
#     z       axial coordinate  [l_global × dz]
#     r       radial coordinate [grid.r[l][m]]
#     r_z     dr/dz skew metric [grid.r_z[l][m]]
#
#   Math constant
#     pi
#
#   Standard functions
#     sin  cos  tan  asin  acos  atan  atan2
#     exp  log  log2 log10 sqrt  pow   abs   sign
#     min  max  clamp
#     (Use exp(1) for Euler's number — 'e' is reserved for specific energy.)
#
#   Previously-assigned field values  (evaluation order below)
#     rho  v_z  v_r  v_phi  H_z  H_r  H_phi  e
#
# Evaluation order:  rho → v_z → v_r → v_phi → H_z → H_r → H_phi → e
#   Each expression may reference fields earlier in this sequence.
#
# Defaults when a field key is absent
# ────────────────────────────────────
#   rho:   1.0
#   v_z:   0.0
#   v_r:   0.0
#   v_phi: 0.0
#   H_z:   H_z0
#   H_r:   "H_z * r_z"
#   H_phi: "(1 - 0.9 * z) * r_0 / r"
#   e:     "beta / (2 * (gamma - 1))"
#
# YAML quoting
#   Quote expressions containing YAML-special characters: * { } : [ ]
#   Plain numbers and bare identifiers need no quotes.
#
initial_conditions:
  type: expression
  params:
    rho:   1.0
    v_z:   0.1
    v_r:   0.1
    v_phi: 0.0
    H_z:   H_z0
    H_r:   "H_z * r_z"
    H_phi: "(1 - 0.9 * z) * r_0 / r"
    e:     "beta / (2 * (gamma - 1))"

# ── Boundary conditions ───────────────────────────────────────────────────────
#
# Each face (l_lo, l_hi, m_lo, m_hi) is a sequence of segments.
# Segments are applied in order; together they should cover the full face.
#
# Segment fields
# ──────────────
#   range       (optional)  [global_lo, global_hi] along the free axis.
#                           Negative value = sentinel for face start/end.
#                           Omit entirely  = full face (same as [-1, -1]).
#
#   rho / v_z / v_r / v_phi / e / H_z / H_r / H_phi
#               (all optional, default = neumann)
#
# Condition syntax
# ────────────────
#   neumann           Zero-gradient: copy from the first interior cell.
#
#   { dirichlet: V }  Fix to the constant value V.
#   { type: dirichlet, value: V }   (verbose form)
#
#   wall_tangent      v_r = v_z * r_z  or  H_r = H_z * r_z.
#                     Valid only for v_r and H_r on M_LO / M_HI faces.
#
#   axis_lf           One-sided Lax–Friedrichs update for the axis of symmetry.
#                     Valid only for rho / v_z / e / H_z on the M_LO face.
#
#   hphi_r0_over_r    Free-vortex inlet profile: H_phi = r_0 / r.
#                     Enforces H_phi · r = const.  Valid only for H_phi.
#
# Free-axis convention
# ─────────────────────
#   l_lo / l_hi faces  →  free axis is m  (range = global m indices)
#   m_lo / m_hi faces  →  free axis is l  (range = global l indices)
#
boundary_conditions:

  l_lo:
    - rho:   neumann
      v_z:   { dirichlet: 0.0 }
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   { dirichlet: 0.25 }
      H_r:   { dirichlet: 0.0 }
      H_phi: hphi_r0_over_r        # H_phi = r_0 / r  →  H_phi·r = r_0 = const

  l_hi:
    - rho:   neumann
      v_z:   neumann
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   neumann
      H_phi: neumann

  m_hi:
    - rho:   neumann
      v_z:   neumann
      v_r:   wall_tangent         # v_r = v_z * r_z
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   wall_tangent         # H_r = H_z * r_z
      H_phi: neumann

  m_lo:
    - range: [0, 236]
      rho:   neumann
      v_z:   neumann
      v_r:   wall_tangent
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   wall_tangent
      H_phi: neumann

    - range: [237, 260]
      rho:   { dirichlet: 1.0 }
      v_z:   neumann
      v_r:   neumann
      v_phi: { dirichlet: 0.0 }
      e:     { dirichlet: 0.0373 }
      H_z:   { dirichlet: 0.25 }
      H_r:   wall_tangent
      H_phi: neumann

    - range: [261, -1]
      rho:   axis_lf
      v_z:   axis_lf
      v_r:   { dirichlet: 0.0 }
      v_phi: { dirichlet: 0.0 }
      e:     axis_lf
      H_z:   axis_lf
      H_r:   { dirichlet: 0.0 }
      H_phi: { dirichlet: 0.0 }
