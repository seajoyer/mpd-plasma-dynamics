physics:
  gamma: 1.67
  beta:  0.05
  H_z_0: 0.25

time:
  T:  0.5
  dt: 0.000010

adaptive_dt:
  enabled:       true
  cfl_number:    0.45
  growth_factor: 1.10
  dt_min:        1.0e-9
  dt_max:        5.0e-5

convergence:
  threshold:       0.0
  check_frequency: 100

output:
  directory: output
  run_name:  villani
  vtk_step:  5000

parallel:
  openmp_threads: 0
  mpi_dims_l: 0
  mpi_dims_m: 0

grid:
  L_max: 800   # 800 cells in z  →  dz = 1/800
  M_max: 400   # 400 cells in r

# ── Geometry: Villani (1982) MPDT benchmark ───────────────────────────────────
#
# Two coaxial cylindrical electrodes of different lengths:
#
#   Cathode (inner):  r_c = 0.95 cm,  l_c = 26.4 cm
#   Anode   (outer):  r_a = 5.10 cm,  l_a = 20.0 cm
#   Simulation box:   r_domain = 10.2 cm,  z_max = 51.0 cm
#
# All lengths are in the same "simulation unit" where z is normalised to [0,1]
# (z = 1 corresponds to the far end of the domain, z_max = 51 cm here).
# Radial values share the same unit, so multiply by z_max = 51 cm to recover cm:
#
#   r_cathode     = 0.0186 × 51 cm ≈ 0.95 cm   ✓
#   r_anode       = 0.100  × 51 cm ≈ 5.10 cm   ✓
#   r_outer_domain= 0.200  × 51 cm ≈ 10.2 cm   ✓
#   z_cathode     = 0.518  × 51 cm ≈ 26.4 cm   ✓
#   z_anode       = 0.392  × 51 cm ≈ 20.0 cm   ✓
#
# The cosine half-widths control the smoothing at each electrode tip.
# Setting them to 0 gives a sharp step (C⁰); the default 0.015 gives a
# C¹ transition spanning ≈ 1.5 cm (0.030 × 51 cm) centred on the tip.
#
geometry:
  type: villani_mpdt
  params:
    # ── Cathode (inner electrode) ──────────────────────────────────────────
    r_cathode:              0.0186   # cathode radius  (≈ 0.95 cm at 51 cm domain)
    z_cathode:              0.518    # cathode tip z-position  [fraction of domain, 0–1]
    r_inner_after:          0.0002   # inner radius beyond the cathode tip (near-axis)
    cathode_tip_half_width: 0.015    # cosine blend half-width  (0 = sharp step)

    # ── Anode (outer electrode) ────────────────────────────────────────────
    r_anode:                0.100    # anode radius   (≈ 5.10 cm)
    z_anode:                0.392    # anode tip z-position  [fraction of domain, 0–1]
    r_outer_domain:         0.200    # outer domain radius beyond the anode (≈ 10.2 cm)
    anode_tip_half_width:   0.015    # cosine blend half-width  (0 = sharp step)

# ── Initial conditions ────────────────────────────────────────────────────────
initial_conditions:
  rho:   1.0
  v_z:   0.1
  v_r:   0.0
  v_phi: 0.0
  H_z:   H_z0
  H_r:   "H_z * r_z"
  H_phi: "r_0 / r"
  e:     "beta / (2 * (gamma - 1))"

# ── Boundary conditions ───────────────────────────────────────────────────────
#
# For the Villani MPDT the M_LO face spans three regions along z:
#
#   [0, z_anode)      Cathode wall where it faces the anode (solid wall).
#   [z_anode, z_cathode)  Cathode wall beyond the anode tip (open on outer side).
#   [z_cathode, end)  Axis of symmetry (no cathode wall, r → 0).
#
# The global l-index boundaries correspond to (with L_max = 800):
#   z_anode   = 0.392 × 800 ≈ l = 314
#   z_cathode = 0.518 × 800 ≈ l = 415
#
# Adjust range values if L_max or z_anode / z_cathode change.
#
boundary_conditions:

  # ── Inlet (z = 0, between cathode and anode) ─────────────────────────────
  l_lo:
    - rho:   neumann
      v_z:   { dirichlet: 0.0 }
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   { dirichlet: 0.25 }
      H_r:   { dirichlet: 0.0 }
      H_phi: "r_0 / r"

  # ── Outlet (z = z_max, free outflow) ─────────────────────────────────────
  l_hi:
    - rho:   neumann
      v_z:   neumann
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   neumann
      H_phi: neumann

  # ── Outer boundary ────────────────────────────────────────────────────────
  #
  # [0, 314]   Anode wall (solid): wall-tangent v_r and H_r.
  # [315, end] Outer domain boundary beyond the anode (free outflow / neumann).
  m_hi:
    - range: [0, 314]
      rho:   neumann
      v_z:   neumann
      v_r:   "v_z * r_z"
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   "H_z * r_z"
      H_phi: neumann

    - range: [315, -1]
      rho:   neumann
      v_z:   neumann
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   neumann
      H_phi: neumann

  # ── Inner boundary (cathode + axis) ──────────────────────────────────────
  #
  # [0, 314]   Cathode wall (solid): wall-tangent v_r and H_r.
  # [315, 414] Cathode wall beyond the anode (same solid wall).
  # [415, end] Axis of symmetry: LF update for rho/v_z/e/H_z; zero for v_r/v_phi/H_r/H_phi.
  m_lo:
    - range: [0, 414]
      rho:   neumann
      v_z:   neumann
      v_r:   "v_z_nb * r_z_nb"
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   "H_z_nb * r_z_nb"
      H_phi: neumann

    - range: [415, -1]
      rho:   axis_lf
      v_z:   axis_lf
      v_r:   { dirichlet: 0.0 }
      v_phi: { dirichlet: 0.0 }
      e:     axis_lf
      H_z:   axis_lf
      H_r:   { dirichlet: 0.0 }
      H_phi: { dirichlet: 0.0 }
