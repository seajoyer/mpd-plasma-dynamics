physics:
  gamma: 1.67
  beta:  0.01
  H_z0:  0.25

time:
  T:  6
  dt: 1.0e-7

adaptive_dt:
  enabled:       true
  cfl_number:    0.45
  growth_factor: 1.10
  dt_min:        1.0e-10
  dt_max:        5.0e-5

convergence:
  threshold:       0.0
  check_frequency: 100

output:
  directory: output
  run_name:  run
  vtk_step:  5000

parallel:
  openmp_threads: 0
  mpi_dims_l: 0
  mpi_dims_m: 0

grid:
  L_max: 800
  M_max: 400

# ── Geometry ─────────────────────────────────────────────────────────────────
#
#   short_cathode_cosine
#     C¹ cosine-smoothed throat transition (recommended).
#     params:
#       z_center:               0.31    # axial centre of the cosine transition
#       transition_half_width:  0.015   # half-width of the transition band
#       r_inner_before:         0.200   # cathode-face inner radius
#       r_inner_after:          0.005   # thin-electrode inner radius
#       r_outer:                0.800   # anode (outer wall) radius
#
# Omitting the params block (or any individual key) uses the default values
# shown above — the simulation is unchanged from the previous hard-coded behaviour.
#
geometry:
  type: short_cathode_cosine
  params:
    z_center:               0.31
    transition_half_width:  0.02
    r_inner_before:         0.200
    r_inner_after:          0.005
    r_outer:                0.800

# ── Initial conditions ────────────────────────────────────────────────────────
#
# ── Mode A: expression IC (default) ──────────────────────────────────────────
#
# Fields are specified as mathematical expressions evaluated cell-by-cell.
# Derived fields (p, P) are computed automatically from the primaries.
#
# ── Mode B: VTK restart ───────────────────────────────────────────────────────
#
# Set vtk_file to the path of a step_NNNN.vtk file written by a previous run.
# All eight physical fields are read from the file and bilinearly interpolated
# onto the current grid.  This supports:
#
#   • Exact restart  — same L_max / M_max: field values are copied 1-to-1,
#                      with no floating-point blending.
#   • Resolution remap — different L_max / M_max: values are interpolated
#                      in fractional (z/L, m/M_max) space so features are
#                      preserved across refinement or coarsening.
#
# The file must be accessible from every MPI rank (shared/NFS filesystem).
# Any expression fields listed alongside vtk_file are silently ignored.
#
# Example:
#   initial_conditions:
#     vtk_file: "output/run_01-01-2025_12:00:00:000/step_5000.vtk"
#
# ── Available symbols for expression IC ──────────────────────────────────────
#
#   Physics constants  (from the [physics] block)
#     gamma   beta   H_z0   r_0
#
#   Spatial variables  (cell-local, read-only)
#     z       axial coordinate  [l_global × dz]
#     r       radial coordinate [grid.r[l][m]]
#     r_z     dr/dz skew metric [grid.r_z[l][m]]
#
#   Math constant
#     pi
#
#   Standard functions
#     sin  cos  tan  asin  acos  atan  atan2
#     exp  log  log2 log10 sqrt  pow   abs   sign
#     min  max  clamp
#     (Use exp(1) for Euler's number — 'e' is reserved for specific energy.)
#
# ── Evaluation order ─────────────────────────────────────────────────────────
#
#   rho → v_z → v_r → v_phi → H_z → H_r → H_phi → e
#   Each expression may reference fields earlier in this sequence.
#
initial_conditions:
  rho:   0.1
  v_z:   0.1
  v_r:   0.1
  v_phi: 0.0
  H_z:   H_z0
  H_r:   "H_z * r_z"
  H_phi: "(1 - 0.9 * z) * r_0 / r"
  e:     "beta / (2 * (gamma - 1))"

# ── Boundary conditions ───────────────────────────────────────────────────────
#
# Each face (l_lo, l_hi, m_lo, m_hi) is a sequence of segments.
# Segments are applied in order; together they should cover the full face.
#
# Segment fields
# ──────────────
#   range       (optional)  [global_lo, global_hi] along the free axis.
#                           Negative value = sentinel for face start/end.
#                           Omit entirely  = full face (same as [-1, -1]).
#
#   rho / v_z / v_r / v_phi / e / H_z / H_r / H_phi
#               (all optional, default = neumann)
#
# Condition syntax
# ────────────────
#   neumann              Zero-gradient: f_bc = f_interior  (offset = 0)
#   { neumann: G }       Constant-offset: f_bc = f_interior + G
#
#   dirichlet            Fix to 0
#   { dirichlet: V }     Fix to the constant value V
#
#   "expression"         Evaluate a formula at each boundary cell.
#   { expr: "..." }      All physics constants, grid quantities,
#                        neighbour values, and previously-evaluated
#                        boundary values are available as symbols.
#                        See FieldCondType::Expression documentation
#                        for the complete symbol table.
#
#   axis_lf              One-sided Lax–Friedrichs update for the axis of
#                        symmetry.  Valid only for rho / v_z / e / H_z
#                        on the M_LO face.
#
# Expression symbol quick-reference
# ──────────────────────────────────
#   Physics:   gamma  beta  H_z0  r_0  dz  dr
#   Boundary cell:  r  r_z  z
#   Neighbour cell: r_nb  r_z_nb
#   Neighbour fields: rho_nb  v_z_nb  v_r_nb  v_phi_nb  e_nb
#                     H_z_nb  H_r_nb  H_phi_nb
#   Boundary values (evaluation order, cross-field references):
#                     rho  v_z  v_r  v_phi  H_z  H_r  H_phi  e
#
# Free-axis convention
# ─────────────────────
#   l_lo / l_hi faces  →  free axis is m  (range = global m indices)
#   m_lo / m_hi faces  →  free axis is l  (range = global l indices)
#
boundary_conditions:

  # ── Inlet (z = 0) ────────────────────────────────────────────────────────
  l_lo:
    - rho:   neumann
      v_z:   { dirichlet: 0.0 }
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   "H_z0"
      H_r:   { dirichlet: 0.0 }
      H_phi: "r_0 / r"

  # ── Outlet (z = L) ───────────────────────────────────────────────────────
  l_hi:
    - rho:   neumann
      v_z:   neumann
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   neumann
      H_phi: neumann

  # ── Outer wall (r = r_outer) ─────────────────────────────────────────────
  m_hi:
    - rho:   neumann
      v_z:   neumann
      v_r:   "v_z * r_z"
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   "H_z * r_z"
      H_phi: neumann

  # ── Inner wall + axis (r = r_inner, then axis of symmetry) ───────────────
  #
  # Three segments in l-direction (global l index along the M_LO face):
  #
  #   [0, 235]    Solid cathode wall. Was calculated as L_max * (z_center - transition_half_width) + 3 cells for robustness
  #               Wall-tangent uses NEIGHBOUR slope (M_LO convention).
  #
  #   [236, 263]  Cathode tip / injection region.
  #               Fixed density, energy, and H_z; wall-tangent for H_r.
  #
  #   [264, end]  Axis of symmetry (r → 0).
  #               Lax–Friedrichs update for rho, v_z, e, H_z.
  #               All other components are zero by symmetry.
  m_lo:
    - range: [0, 235]
      rho:   neumann
      v_z:   neumann
      v_r:   "v_z_nb * r_z_nb"
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   "H_z_nb * r_z_nb"
      H_phi: neumann

    - range: [236, 263]
      rho:   { dirichlet: 0.1 }
      v_z:   neumann
      v_r:   neumann
      v_phi: { dirichlet: 0.0 }
      e:     "beta / (2 * (gamma - 1))"
      H_z:   neumann
      H_r:   "H_z_nb * r_z_nb"
      H_phi: neumann

    - range: [264, -1]
      rho:   axis_lf
      v_z:   axis_lf
      v_r:   { dirichlet: 0.0 }
      v_phi: { dirichlet: 0.0 }
      e:     axis_lf
      H_z:   axis_lf
      H_r:   { dirichlet: 0.0 }
      H_phi: { dirichlet: 0.0 }
