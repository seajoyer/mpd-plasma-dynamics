physics:
  gamma: 1.67
  beta:  0.05
  H_z0:  0.25

time:
  T:  0.5
  dt: 0.00001

adaptive_dt:
  enabled:       true
  cfl_number:    0.45
  growth_factor: 1.10
  dt_min:        1.0e-9
  dt_max:        5.0e-5

convergence:
  threshold:       0.0
  check_frequency: 100

output:
  directory: output
  run_name:  run
  vtk_step:  5000

parallel:
  openmp_threads: 0
  mpi_dims_l: 0
  mpi_dims_m: 0

grid:
  L_max: 800
  M_max: 400

# ── Geometry ─────────────────────────────────────────────────────────────────
#
# type must match a name registered in register_all_geometries().
#
# Built-in types:
#   short_cathode_cosine     C¹ cosine-smoothed throat transition (recommended)
#   short_cathode_parabolic  Piecewise-parabolic throat (legacy)
#
geometry:
  type: short_cathode_cosine

# ── Initial conditions ────────────────────────────────────────────────────────
#
# Fields are specified as mathematical expressions evaluated cell-by-cell.
# Derived fields (p, P) are computed automatically from the primaries.
#
# Omitting a field uses its built-in default (see below).
# Omitting the entire `initial_conditions` section applies all defaults,
# producing a standard quiescent MHD state.
#
# ── Available symbols ─────────────────────────────────────────────────────────
#
#   Physics constants  (from the [physics] block)
#     gamma   beta   H_z0   r_0
#
#   Spatial variables  (cell-local, read-only)
#     z       axial coordinate  [l_global × dz]
#     r       radial coordinate [grid.r[l][m]]
#     r_z     dr/dz skew metric [grid.r_z[l][m]]
#
#   Math constant
#     pi
#
#   Standard functions
#     sin  cos  tan  asin  acos  atan  atan2
#     exp  log  log2 log10 sqrt  pow   abs   sign
#     min  max  clamp
#     (Use exp(1) for Euler's number — 'e' is reserved for specific energy.)
#
#   Previously-assigned field values  (evaluation order below)
#     rho  v_z  v_r  v_phi  H_z  H_r  H_phi  e
#
# ── Evaluation order ─────────────────────────────────────────────────────────
#
#   rho → v_z → v_r → v_phi → H_z → H_r → H_phi → e
#   Each expression may reference fields earlier in this sequence.
#
# ── Defaults when a field key is absent ──────────────────────────────────────
#
#   rho:   1.0
#   v_z:   0.0
#   v_r:   0.0
#   v_phi: 0.0
#   H_z:   H_z0
#   H_r:   "H_z * r_z"
#   H_phi: "(1 - 0.9 * z) * r_0 / r"
#   e:     "beta / (2 * (gamma - 1))"
#
initial_conditions:
  rho:   1.0
  v_z:   0.1
  v_r:   0.1
  v_phi: 0.0
  H_z:   H_z0
  H_r:   "H_z * r_z"
  H_phi: "(1 - 0.9 * z) * r_0 / r"
  e:     "beta / (2 * (gamma - 1))"

# ── Boundary conditions ───────────────────────────────────────────────────────
#
# Each face (l_lo, l_hi, m_lo, m_hi) is a sequence of segments.
# Segments are applied in order; together they should cover the full face.
#
# Segment fields
# ──────────────
#   range       (optional)  [global_lo, global_hi] along the free axis.
#                           Negative value = sentinel for face start/end.
#                           Omit entirely  = full face (same as [-1, -1]).
#
#   rho / v_z / v_r / v_phi / e / H_z / H_r / H_phi
#               (all optional, default = neumann)
#
# Condition syntax
# ────────────────
#   neumann              Zero-gradient: f_bc = f_interior  (offset = 0)
#   { neumann: G }       Constant-offset: f_bc = f_interior + G
#
#   dirichlet            Fix to 0
#   { dirichlet: V }     Fix to the constant value V
#
#   "expression"         Evaluate a formula at each boundary cell.
#   { expr: "..." }      All physics constants, grid quantities,
#                        neighbour values, and previously-evaluated
#                        boundary values are available as symbols.
#                        See FieldCondType::Expression documentation
#                        for the complete symbol table.
#
#   axis_lf              One-sided Lax–Friedrichs update for the axis of
#                        symmetry.  Valid only for rho / v_z / e / H_z
#                        on the M_LO face.
#
# Expression symbol quick-reference
# ──────────────────────────────────
#   Physics:   gamma  beta  H_z0  r_0  dz  dr
#   Boundary cell:  r  r_z  z
#   Neighbour cell: r_nb  r_z_nb
#   Neighbour fields: rho_nb  v_z_nb  v_r_nb  v_phi_nb  e_nb
#                     H_z_nb  H_r_nb  H_phi_nb
#   Boundary values (evaluation order, cross-field references):
#                     rho  v_z  v_r  v_phi  H_z  H_r  H_phi  e
#
# Free-axis convention
# ─────────────────────
#   l_lo / l_hi faces  →  free axis is m  (range = global m indices)
#   m_lo / m_hi faces  →  free axis is l  (range = global l indices)
#
boundary_conditions:

  # ── Inlet (z = 0) ────────────────────────────────────────────────────────
  l_lo:
    - rho:   neumann
      v_z:   { dirichlet: 0.0 }
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   { dirichlet: 0.25 }
      H_r:   { dirichlet: 0.0 }
      H_phi: "r_0 / r"

  # ── Outlet (z = L) ───────────────────────────────────────────────────────
  l_hi:
    - rho:   neumann
      v_z:   neumann
      v_r:   neumann
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   neumann
      H_phi: neumann

  # ── Outer wall (r = r_outer) ─────────────────────────────────────────────
  m_hi:
    - rho:   neumann
      v_z:   neumann
      v_r:   "v_z * r_z"
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   "H_z * r_z"
      H_phi: neumann

  # ── Inner wall + axis (r = r_inner, then axis of symmetry) ───────────────
  #
  # Three segments in l-direction (global l index along the M_LO face):
  #
  #   [0, 236]    Solid cathode wall.
  #               Wall-tangent uses NEIGHBOUR slope (M_LO convention).
  #
  #   [237, 260]  Cathode tip / injection region.
  #               Fixed density, energy, and H_z; wall-tangent for H_r.
  #
  #   [261, end]  Axis of symmetry (r → 0).
  #               Lax–Friedrichs update for rho, v_z, e, H_z.
  #               All other components are zero by symmetry.
  m_lo:
    - range: [0, 236]
      rho:   neumann
      v_z:   neumann
      v_r:   "v_z_nb * r_z_nb"
      v_phi: neumann
      e:     neumann
      H_z:   neumann
      H_r:   "H_z_nb * r_z_nb"
      H_phi: neumann

    - range: [237, 260]
      rho:   { dirichlet: 1.0 }
      v_z:   neumann
      v_r:   neumann
      v_phi: { dirichlet: 0.0 }
      e:     { dirichlet: 0.0373 }
      H_z:   { dirichlet: 0.25 }
      H_r:   "H_z_nb * r_z_nb"
      H_phi: neumann

    - range: [261, -1]
      rho:   axis_lf
      v_z:   axis_lf
      v_r:   { dirichlet: 0.0 }
      v_phi: { dirichlet: 0.0 }
      e:     axis_lf
      H_z:   axis_lf
      H_r:   { dirichlet: 0.0 }
      H_phi: { dirichlet: 0.0 }
