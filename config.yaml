physics:
  gamma: 1.67
  beta:  0.05
  H_z0:  0.25

time:
  T:  5.0
  dt: 0.000020   # initial dt; also the fixed dt when adaptive_dt.enabled = false

# ── Adaptive time stepping ──────────────────────────────────────────────────
# When enabled, dt is recomputed after every step to keep the simulation at
# the target CFL number.  The `dt` above is only used as the starting step.
#
# Recommended workflow:
#   1. Run once with adaptive_dt.enabled: false to get a baseline.
#   2. Enable adaptive_dt and set cfl_number ≤ 0.5 for stability.
#   3. Tighten dt_min / dt_max if the wave speed varies widely.
adaptive_dt:
  enabled:       false   # set to true to activate CFL-driven stepping
  cfl_number:    0.45    # target CFL (< 0.5 for Lax–Friedrichs stability)
  growth_factor: 1.10    # max dt growth factor per step (e.g. 1.10 = +10 %)
  dt_min:        1.0e-9  # hard lower bound (prevents stall on wave-speed spike)
  dt_max:        1.0e-3  # hard upper bound

grid:
  L_max_global: 800
  L_end:        320
  M_max:        400

convergence:
  threshold:       0.0
  check_frequency: 100

output:
  directory: output
  run_name:  run
  vtk_step:  5000

parallel:
  openmp_threads: 0   # 0 = defer to OMP_NUM_THREADS

  # MPI Cartesian decomposition.
  # 0 means "let MPI_Dims_create choose automatically".
  #
  # Pure-MPI benchmark (--cpus-per-task=1, all ranks on one axis):
  #   mpi_dims_l: 0   # fills with total rank count
  #   mpi_dims_m: 1   # 1-D decomposition: no column packing, wider inner loop
  #
  # Hybrid MPI+OpenMP (e.g. 12 MPI × 4 OMP):
  #   mpi_dims_l: 0   # auto
  #   mpi_dims_m: 0   # auto 2-D split; OpenMP covers M within each rank
  mpi_dims_l: 0
  mpi_dims_m: 1   # set to 1 for pure-MPI runs; 0 for hybrid MPI+OMP
