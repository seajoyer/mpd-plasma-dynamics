physics:
  gamma: 1.67
  beta:  0.05
  H_z0:  0.25

time:
  T:  3.0
  dt: 0.00002

adaptive_dt:
  enabled:       false
  cfl_number:    0.45
  growth_factor: 1.10
  dt_min:        1.0e-9
  dt_max:        1.0e-5

convergence:
  threshold:       0.0
  check_frequency: 100

output:
  directory: output
  run_name:  run
  vtk_step:  5000

parallel:
  openmp_threads: 0
  mpi_dims_l: 0
  mpi_dims_m: 0

grid:
  L_max_global: 800
  M_max:        400

# ── Geometry ────────────────────────────────────────────────────────────────
# `type` must match a name registered in register_all_geometries().
# The optional `params` sub-node is forwarded to the geometry constructor.
#
# Built-in types:
#   short_cathode_parabolic
#   short_cathode_cosine
#
geometry:
  type: short_cathode_cosine

# ── Boundary conditions ─────────────────────────────────────────────────────
#
# Each face (l_lo, l_hi, m_lo, m_hi) holds a list of segments.
# Segments are applied in order; together they should cover the full face.
#
# Segment fields:
#   type       (required)  – name registered in register_all_bcs()
#   range      (optional)  – [global_lo, global_hi] along the free axis
#                            negative value = sentinel for face start/end
#                            omit entirely  = full face (same as [-1, -1])
#   params     (optional)  – BC-specific parameters forwarded to constructor
#
# Free-axis convention:
#   l_lo / l_hi faces  →  free axis is m  (range values are global m indices)
#   m_lo / m_hi faces  →  free axis is l  (range values are global l indices)
#
# Built-in BC types:
#   inflow         – L_LO  – prescribed inflow; v_z matched from interior
#   outflow        – L_HI  – zero-gradient (copies u from last interior cell)
#   outer_wall     – M_HI  – wall-tangent condition
#   solid_wall     – M_LO  – wall-tangent condition (nozzle / electrode)
#   axis_symmetry  – M_LO  – one-sided Lax-Friedrichs with symmetry constraints
#
boundary_conditions:

  # Inflow at z = 0 — single segment, covers the full face.
  l_lo:
    - type: inflow

  # Outflow at z = L — single segment, covers the full face.
  l_hi:
    - type: outflow

  # Outer wall — single segment, covers the full face.
  m_hi:
    - type: outer_wall

  # Inner boundary — two segments covering different axial regions:
  #   [0, 320]   solid nozzle / electrode wall  (up to and including the throat)
  #   [321, end] open axis of symmetry          (downstream of the nozzle)
  #
  # Adjust the split index here to move the nozzle/axis transition without
  # touching any C++ source.  Use -1 as a sentinel for "to the end of the face".
  m_lo:
    - range: [0, 260]
      type: solid_wall
    - range: [261, -1]
      type: axis_symmetry

# ── Example: custom inlet strip ─────────────────────────────────────────────
# To replace part of the inflow face with a different BC, split l_lo into
# multiple segments.  Example (not active — uncomment to test):
#
# boundary_conditions:
#   l_lo:
#     - range: [-1, 99]         # m = 0..99  — normal inflow
#       type: inflow
#     - range: [100, 200]       # m = 100..200 — custom prescribed inlet
#       type: my_inlet
#       params:
#         v_z: 0.30
#         rho: 1.2
#     - range: [201, -1]        # m = 201..end — normal inflow
#       type: inflow
